<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Focus — Productivity Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&family=Lora:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-base:       #0e0f11;
    --bg-surface:    #141518;
    --bg-elevated:   #1a1c20;
    --bg-hover:      #20232a;
    --border:        rgba(255,255,255,0.06);
    --border-mid:    rgba(255,255,255,0.10);
    --border-strong: rgba(255,255,255,0.16);
    --text-primary:  #e8e9ec;
    --text-secondary:#8a8d96;
    --text-muted:    #50535c;
    --accent-green:  #5DCAA5;
    --font-mono: 'DM Mono', monospace;
    --font-sans: 'DM Sans', sans-serif;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
  }

  html, body {
    height: 100%; width: 100%;
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.5;
    overflow: hidden;
    position: fixed;
  }

  /* ── DESKTOP ── */
  .desktop-app {
    display: grid;
    grid-template-columns: 320px 1fr;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 44px;
    overflow: hidden;
  }

  .left-panel {
    background: var(--bg-surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 8px;
    padding: 20px 16px;
    overflow-y: auto; overflow-x: hidden;
  }
  .left-panel::-webkit-scrollbar { width: 4px; }
  .left-panel::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 4px; }

  .right-panel {
    background: var(--bg-base);
    padding: 20px;
    display: flex; flex-direction: column; gap: 12px;
    overflow-y: auto;
  }
  .right-panel::-webkit-scrollbar { width: 4px; }
  .right-panel::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 4px; }

  /* ── MOBILE ── */
  .mobile-app {
    display: none;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 44px;
  }

  .tab-bar {
    display: flex;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    height: 44px;
  }
  .tab-btn {
    flex: 1; padding: 0 4px;
    font-size: 11px; font-weight: 500;
    font-family: var(--font-sans);
    color: var(--text-muted);
    background: transparent; border: none; cursor: pointer;
    letter-spacing: 0.04em;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .tab-btn.active { color: var(--accent-green); border-bottom-color: var(--accent-green); }

  .swipe-container {
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  .swipe-track {
    display: flex;
    height: 100%;
    transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
    will-change: transform;
  }
  .swipe-panel {
    height: 100%;
    overflow-y: auto; overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding: 16px 16px 20px;
    display: flex; flex-direction: column; gap: 10px;
    flex-shrink: 0;
  }
  .swipe-panel::-webkit-scrollbar { display: none; }

  /* ── DATA BAR ── */
  .data-bar {
    height: 44px;
    display: flex; align-items: center; gap: 8px;
    padding: 0 14px;
    background: var(--bg-surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    position: fixed; bottom: 0; left: 0; right: 0;
    z-index: 100;
    touch-action: manipulation;
  }
  .data-bar-label {
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-muted); margin-right: 2px;
  }
  .data-btn {
    font-size: 11px; font-family: var(--font-sans);
    padding: 4px 10px; border-radius: var(--radius-sm);
    border: 1px solid var(--border-mid);
    background: var(--bg-elevated);
    color: var(--text-secondary); cursor: pointer;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .data-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
  .data-btn.accent { border-color: rgba(93,202,165,0.3); color: var(--accent-green); }
  .data-btn.accent:hover { background: rgba(93,202,165,0.08); }
  .data-spacer { flex: 1; }

  /* ── TOAST ── */
  .reset-all-btn { border-color: rgba(220,60,60,0.3); color: #e05555; }
  .reset-all-btn:hover { background: rgba(220,60,60,0.1); color: #ff6666; }

  .confirm-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .confirm-overlay.show { opacity: 1; pointer-events: all; }
  .confirm-box {
    background: var(--bg-elevated);
    border: 1px solid var(--border-mid);
    border-radius: var(--radius-lg);
    padding: 24px 20px 16px;
    width: min(280px, 85vw);
    display: flex; flex-direction: column; gap: 10px;
    text-align: center;
  }
  .confirm-title { font-size: 15px; font-weight: 500; color: var(--text-primary); }
  .confirm-sub { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
  .confirm-actions { display: flex; gap: 8px; margin-top: 4px; }
  .confirm-actions button {
    flex: 1; padding: 9px; border-radius: var(--radius-md);
    font-size: 13px; font-family: var(--font-sans);
    cursor: pointer; border: 1px solid var(--border-mid);
    touch-action: manipulation; -webkit-tap-highlight-color: transparent;
  }
  .confirm-cancel { background: var(--bg-hover); color: var(--text-secondary); }
  .confirm-cancel:hover { color: var(--text-primary); }
  .confirm-confirm { background: rgba(220,60,60,0.15); color: #e05555; border-color: rgba(220,60,60,0.3); }
  .confirm-confirm:hover { background: rgba(220,60,60,0.25); }

  .toast {
    position: fixed; bottom: 56px; left: 50%;
    transform: translateX(-50%);
    background: var(--bg-elevated);
    border: 1px solid var(--border-mid);
    color: var(--text-primary); font-size: 12px;
    padding: 8px 16px; border-radius: var(--radius-md);
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s; z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  /* ── SHARED COMPONENTS ── */
  .wakeup-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    cursor: pointer; user-select: none;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 4px;
  }
  .wakeup-row:hover { border-color: var(--border-mid); background: var(--bg-hover); }
  .wakeup-row.done { border-color: rgba(93,202,165,0.3); background: rgba(93,202,165,0.06); }

  .wakeup-box {
    width: 17px; height: 17px; border-radius: 4px;
    border: 1.5px solid var(--border-strong);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, border-color 0.2s;
  }
  .wakeup-box.checked { background: var(--accent-green); border-color: var(--accent-green); }
  .wakeup-check { display: none; }
  .wakeup-box.checked .wakeup-check { display: block; }
  .wakeup-label { font-size: 13px; color: var(--text-secondary); transition: color 0.2s; }
  .wakeup-row.done .wakeup-label { color: var(--accent-green); text-decoration: line-through; text-decoration-color: rgba(93,202,165,0.4); }

  .section-label {
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-muted); padding: 4px 2px 2px;
  }

  .timer-card {
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    overflow: hidden; transition: border-color 0.2s;
  }
  .timer-card:hover { border-color: var(--border-mid); }

  .timer-header {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 11px 7px;
    border-bottom: 1px solid var(--border);
  }

  .color-swatch {
    width: 13px; height: 13px; border-radius: 50%;
    flex-shrink: 0; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.15);
    position: relative;
  }
  .color-swatch input[type=color] {
    position: absolute; opacity: 0;
    width: 100%; height: 100%;
    cursor: pointer; border: none; padding: 0;
  }

  .timer-title-input {
    flex: 1; font-size: 12px; font-weight: 400;
    font-family: var(--font-sans);
    color: var(--text-secondary);
    background: transparent; border: none; outline: none; min-width: 0;
  }
  .timer-title-input::placeholder { color: var(--text-muted); }
  .timer-title-input:focus { color: var(--text-primary); }

  .timer-body { display: flex; align-items: center; padding: 10px 11px; }

  .timer-accent-bar {
    width: 2px; border-radius: 2px; height: 32px;
    flex-shrink: 0; margin-right: 10px; opacity: 0.75;
  }

  .timer-display {
    flex: 1; font-size: 24px; font-weight: 300;
    font-family: 'Lora', serif; letter-spacing: 0.5px;
    color: var(--text-primary); cursor: pointer; line-height: 1;
    transition: opacity 0.15s;
  }
  .timer-display:hover { opacity: 0.6; }

  .timer-time-edit {
    flex: 1; font-size: 18px; font-weight: 300;
    font-family: 'Lora', serif;
    background: var(--bg-hover);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 3px 7px;
    color: var(--text-primary); outline: none; display: none;
  }

  .play-btn {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid var(--border-mid);
    background: var(--bg-hover);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    color: var(--text-secondary);
  }
  .play-btn:hover { background: var(--bg-surface); border-color: var(--border-strong); color: var(--text-primary); transform: scale(1.06); }
  .play-btn.running { color: var(--accent-green); border-color: rgba(93,202,165,0.3); }

  .reset-btn {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    color: var(--text-muted); margin-left: 4px;
  }
  .reset-btn:hover { background: var(--bg-hover); border-color: var(--border-mid); color: var(--text-secondary); }

  .timer-sub {
    font-size: 10px; color: var(--text-muted);
    padding: 0 11px 7px; font-family: var(--font-mono);
  }

  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 4px;
  }

  .add-btn {
    font-size: 12px; font-family: var(--font-sans);
    padding: 5px 12px; border-radius: var(--radius-sm);
    border: 1px solid var(--border-mid);
    background: var(--bg-elevated);
    color: var(--text-secondary); cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .add-btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-strong); }

  .todo-card {
    background: var(--bg-surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    overflow: hidden; transition: border-color 0.2s;
  }
  .todo-card:hover { border-color: var(--border-mid); }
  .todo-accent-strip { height: 2px; width: 100%; opacity: 0.7; }

  .todo-card-header {
    display: flex; align-items: center; gap: 8px;
    padding: 11px 13px 9px;
    border-bottom: 1px solid var(--border);
  }
  .todo-title-input {
    flex: 1; font-size: 13px; font-weight: 500;
    font-family: var(--font-sans);
    color: var(--text-primary);
    background: transparent; border: none; outline: none; min-width: 0;
  }
  .todo-title-input::placeholder { color: var(--text-muted); font-weight: 400; }

  .todo-delete-btn {
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px; border: none; background: transparent;
    color: var(--text-muted); cursor: pointer;
    font-size: 16px; line-height: 1;
    transition: background 0.1s, color 0.1s;
    padding: 0; font-family: var(--font-sans);
  }
  .todo-delete-btn:hover { background: rgba(220,60,60,0.12); color: #e05555; }

  .todo-tasks { padding: 4px 0; }
  .task-row {
    display: flex; align-items: center; gap: 9px;
    padding: 5px 13px; transition: background 0.1s;
  }
  .task-row:hover { background: var(--bg-elevated); }

  .task-check {
    width: 15px; height: 15px; border-radius: 50%;
    border: 1.5px solid var(--border-strong); flex-shrink: 0;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }
  .task-check.done { border-color: transparent; }
  .task-check.done svg { display: block; }
  .task-check svg { display: none; }

  .task-text {
    flex: 1; font-size: 13px; font-family: var(--font-sans);
    color: var(--text-primary);
    background: transparent; border: none; outline: none; min-width: 0;
  }
  .task-text::placeholder { color: var(--text-muted); }
  .task-text.done { text-decoration: line-through; color: var(--text-muted); }

  .task-del {
    width: 18px; height: 18px; border-radius: 3px;
    border: none; background: transparent;
    color: var(--text-muted); cursor: pointer;
    font-size: 14px; display: none;
    align-items: center; justify-content: center;
    padding: 0; line-height: 1; font-family: var(--font-sans);
    transition: color 0.1s;
  }
  .task-row:hover .task-del { display: flex; }
  .task-del:hover { color: #e05555; }

  .todo-add-task {
    display: flex; align-items: center;
    padding: 7px 13px 10px;
    border-top: 1px solid var(--border);
  }
  .add-task-btn {
    font-size: 12px; font-family: var(--font-sans);
    color: var(--text-muted); background: transparent;
    border: none; cursor: pointer; padding: 0;
    display: flex; align-items: center; gap: 6px;
    transition: color 0.15s;
  }
  .add-task-btn:hover { color: var(--text-secondary); }

  .empty-state {
    text-align: center; padding: 48px 16px;
    color: var(--text-muted); font-size: 13px;
  }

  .lists-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px; align-content: start;
  }

  .section-divider {
    border: none; border-top: 1px solid var(--border); margin: 4px 0;
  }

  /* ── MOBILE BREAKPOINT ── */
  @media (max-width: 640px) {
    .desktop-app { display: none; }
    .mobile-app { display: flex; }
    .lists-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ── DESKTOP ── -->
<div class="desktop-app" id="desktopApp">
  <div class="left-panel" id="leftPanel">
    <div class="wakeup-row" id="wakeupRow-d" onclick="toggleWakeup()">
      <div class="wakeup-box" id="wakeupBox-d">
        <svg class="wakeup-check" width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M1.5 5L4 7.5L8.5 2.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="wakeup-label" id="wakeupLabel-d">Woke up</span>
    </div>
    <div class="section-label">Timers</div>
  </div>

  <div class="right-panel" id="rightPanel">
    <div class="section-label" style="padding:0">Daily</div>
    <div class="lists-grid" id="defaultContainer-d"></div>
    <div class="section-divider"></div>
    <div class="panel-header">
      <span class="section-label" style="padding:0">My lists</span>
      <button class="add-btn" onclick="addTodoList()">+ New list</button>
    </div>
    <div class="lists-grid" id="todoContainer-d">
      <div class="empty-state" id="emptyState-d">No lists yet.<br>Click "+ New list" to get started.</div>
    </div>
  </div>
</div>

<!-- ── MOBILE ── -->
<div class="mobile-app" id="mobileApp">
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-0" onclick="goTab(0,true)">Timers</button>
    <button class="tab-btn"        id="tab-1" onclick="goTab(1,true)">Daily</button>
    <button class="tab-btn"        id="tab-2" onclick="goTab(2,true)">My Lists</button>
  </div>
  <div class="swipe-container" id="swipeContainer">
    <div class="swipe-track" id="swipeTrack">
      <!-- Tab 0: Woke up + Timers -->
      <div class="swipe-panel" id="mobileTimerPanel">
        <div class="wakeup-row" id="wakeupRow-m" onclick="toggleWakeup()">
          <div class="wakeup-box" id="wakeupBox-m">
            <svg class="wakeup-check" width="10" height="10" viewBox="0 0 10 10" fill="none">
              <path d="M1.5 5L4 7.5L8.5 2.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="wakeup-label" id="wakeupLabel-m">Woke up</span>
        </div>
        <div class="section-label">Timers</div>
      </div>
      <!-- Tab 1: Daily lists -->
      <div class="swipe-panel">
        <div class="section-label" style="padding:0">Daily</div>
        <div id="defaultContainer-m"></div>
      </div>
      <!-- Tab 2: My lists -->
      <div class="swipe-panel">
        <div class="panel-header">
          <span class="section-label" style="padding:0">My lists</span>
          <button class="add-btn" onclick="addTodoList()">+ New list</button>
        </div>
        <div id="todoContainer-m">
          <div class="empty-state" id="emptyState-m">No lists yet.<br>Tap "+ New list" to get started.</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── PERSISTENT DATA BAR (both layouts) ── -->
<div class="data-bar">
  <span class="data-bar-label">Data</span>
  <button class="data-btn" onclick="copyState()">Copy</button>
  <button class="data-btn" onclick="downloadState()">Download</button>
  <button class="data-btn accent" onclick="triggerUpload()">Load file</button>
  <input type="file" id="fileInput" accept=".json" style="display:none" onchange="loadStateFile(this)">
  <div class="data-spacer"></div>
  <button class="data-btn reset-all-btn" onclick="confirmResetAll()">Reset all</button>
</div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-title">Reset everything?</div>
    <div class="confirm-sub">Timers reset to defaults and daily tasks unchecked. Your custom lists are untouched.</div>
    <div class="confirm-actions">
      <button class="confirm-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="confirm-confirm" onclick="resetAll()">Reset all</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ─────────── STATE ─────────── */
const TIMER_DEFAULTS = [
  { label: 'Productivity Timer',   seconds: 6*3600, color: '#378ADD' },
  { label: 'Personal Development', seconds: 4*3600, color: '#EC3636' },
  { label: 'Time with God',        seconds: 2*3600, color: '#8B5CF6' },
  { label: 'Skill Development',    seconds: 1*3600, color: '#F97316' },
];

let wokenUp = false;

let timers = TIMER_DEFAULTS.map((t, i) => ({
  id: i, label: t.label, seconds: t.seconds, color: t.color,
  running: false, startedAt: null, secondsAtStart: null
}));

let todoIdCounter = 0;
let taskIdCounter = 0;

function makeTasks(texts) {
  return texts.map(text => ({ id: taskIdCounter++, text, done: false }));
}

let todoLists = [
  { id: todoIdCounter++, title: 'Physical Activities', color: '#22C55E', isDefault: true,
    tasks: makeTasks(['Morning Workout/Stretch', 'Gym/Recovery', 'Cardio']) },
  { id: todoIdCounter++, title: 'Social Interactions',  color: '#EAB308', isDefault: true,
    tasks: makeTasks(['1','2','3','4','5']) },
];

/* ─────────── MOBILE SWIPE ─────────── */
let currentTab = 0;
let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
let isSwiping = false;

function setSwipePanelWidths() {
  const w = window.innerWidth;
  const track = document.getElementById('swipeTrack');
  const panels = document.querySelectorAll('.swipe-panel');
  if (track) track.style.width = (w * 3) + 'px';
  panels.forEach(p => p.style.width = w + 'px');
  goTab(currentTab, false);
}

function goTab(idx, animate) {
  currentTab = idx;
  const w = window.innerWidth;
  const track = document.getElementById('swipeTrack');
  if (track) {
    track.style.transition = animate === false ? 'none' : 'transform 0.32s cubic-bezier(0.4,0,0.2,1)';
    track.style.transform = `translateX(${-idx * w}px)`;
  }
  [0,1,2].forEach(i => {
    const btn = document.getElementById(`tab-${i}`);
    if (btn) btn.classList.toggle('active', i === idx);
  });
}

const swipeEl = document.getElementById('swipeContainer');
if (swipeEl) {
  swipeEl.addEventListener('touchstart', e => {
    const target = e.target;
    // Don't intercept touches on interactive elements
    if (target.tagName === 'INPUT' || target.tagName === 'BUTTON' || target.tagName === 'SELECT' || target.closest('button') || target.closest('input')) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchStartTime = Date.now();
    isSwiping = false;
  }, { passive: true });

  swipeEl.addEventListener('touchmove', e => {
    if (!touchStartX) return;
    const dx = e.touches[0].clientX - touchStartX;
    const dy = e.touches[0].clientY - touchStartY;
    if (!isSwiping && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) {
      isSwiping = true;
    }
  }, { passive: true });

  swipeEl.addEventListener('touchend', e => {
    if (!isSwiping) { touchStartX = 0; return; }
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
      goTab(dx < 0 ? Math.min(currentTab + 1, 2) : Math.max(currentTab - 1, 0), true);
    }
    touchStartX = 0; isSwiping = false;
  }, { passive: true });
}

window.addEventListener('resize', setSwipePanelWidths);

/* ─────────── TIMER UTILS ─────────── */
function fmt(s) {
  s = Math.max(0, Math.round(s));
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sc = s % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
}
function parseTime(str) {
  const p = str.split(':').map(Number);
  if (p.length === 3) return p[0]*3600 + p[1]*60 + p[2];
  if (p.length === 2) return p[0]*3600 + p[1]*60;
  return NaN;
}
function getRemaining(t) {
  if (t.running) return Math.max(0, t.secondsAtStart - (Date.now() - t.startedAt) / 1000);
  return t.seconds;
}
function playIcon()  { return `<svg width="10" height="12" viewBox="0 0 10 12" fill="none"><path d="M1 1.2L9 6L1 10.8V1.2Z" fill="currentColor"/></svg>`; }
function pauseIcon() { return `<svg width="10" height="12" viewBox="0 0 10 12" fill="none"><rect x="1" y="1" width="3" height="10" rx="1" fill="currentColor"/><rect x="6" y="1" width="3" height="10" rx="1" fill="currentColor"/></svg>`; }
function resetIcon() { return `<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1.5 5.5A4 4 0 1 0 2.9 2.7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M1.5 2V5.5H5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>`; }

function tickAll() {
  timers.forEach(t => {
    if (!t.running) return;
    const rem = getRemaining(t);
    document.querySelectorAll(`.tdisp-${t.id}`).forEach(el => el.textContent = fmt(rem));
    if (rem <= 0) { t.seconds = 0; t.running = false; updateTimerUI(t.id); }
  });
  requestAnimationFrame(tickAll);
}

/* ─────────── RENDER TIMERS ─────────── */
function timerCardHTML(t, pfx) {
  return `
    <div class="timer-header">
      <div class="color-swatch" style="background:${t.color}">
        <input type="color" value="${t.color}"
          oninput="changeTimerColor(${t.id},this.value); saveToLocal();">
      </div>
      <input class="timer-title-input" value="${t.label}" placeholder="Timer name"
        oninput="timers[${t.id}].label=this.value; saveToLocal();">
    </div>
    <div class="timer-body">
      <div class="timer-accent-bar tbar-${t.id}" style="background:${t.color}"></div>
      <div class="timer-display tdisp-${t.id}" onclick="startEditTimer(${t.id},'${pfx}')">${fmt(t.seconds)}</div>
      <input class="timer-time-edit tedit-${t.id}-${pfx}" type="text" placeholder="h:mm:ss"
        onblur="commitEditTimer(${t.id},'${pfx}')"
        onkeydown="if(event.key==='Enter')commitEditTimer(${t.id},'${pfx}')">
      <button class="play-btn playbtn-${t.id} ${t.running?'running':''}" onclick="toggleTimer(${t.id})">
        ${t.running ? pauseIcon() : playIcon()}
      </button>
      <button class="reset-btn" onclick="resetTimer(${t.id})" title="Reset">${resetIcon()}</button>
    </div>
    <div class="timer-sub tsub-${t.id}">${t.running?'running':'paused'} · click time to edit</div>
  `;
}

function renderTimers() {
  [['leftPanel','d'],['mobileTimerPanel','m']].forEach(([panelId, pfx]) => {
    const panel = document.getElementById(panelId);
    if (!panel) return;
    panel.querySelectorAll('.timer-card').forEach(e => e.remove());
    timers.forEach(t => {
      const card = document.createElement('div');
      card.className = 'timer-card';
      card.innerHTML = timerCardHTML(t, pfx);
      panel.appendChild(card);
    });
  });
}

function changeTimerColor(id, color) {
  timers[id].color = color;
  document.querySelectorAll(`.tbar-${id}`).forEach(el => el.style.background = color);
}
function toggleTimer(id) {
  const t = timers[id];
  if (t.running) {
    t.seconds = getRemaining(t); t.running = false;
  } else {
    if (t.seconds <= 0) return;
    t.startedAt = Date.now(); t.secondsAtStart = t.seconds; t.running = true;
  }
  updateTimerUI(id);
  saveToLocal();
}
function updateTimerUI(id) {
  const t = timers[id];
  document.querySelectorAll(`.playbtn-${id}`).forEach(btn => {
    btn.innerHTML = t.running ? pauseIcon() : playIcon();
    btn.classList.toggle('running', t.running);
  });
  document.querySelectorAll(`.tsub-${id}`).forEach(el => {
    el.textContent = (t.running ? 'running' : 'paused') + ' · click time to edit';
  });
}
function startEditTimer(id, pfx) {
  const t = timers[id];
  if (t.running) return;
  document.querySelectorAll(`.tdisp-${id}`).forEach(el => el.style.display = 'none');
  const edit = document.querySelector(`.tedit-${id}-${pfx}`);
  if (edit) { edit.style.display = 'block'; edit.value = fmt(t.seconds); edit.focus(); edit.select(); }
}
function commitEditTimer(id, pfx) {
  const t = timers[id];
  const edit = document.querySelector(`.tedit-${id}-${pfx}`);
  if (edit) {
    const parsed = parseTime(edit.value);
    if (!isNaN(parsed) && parsed >= 0) {
      t.seconds = parsed;
      if (t.running) { t.startedAt = Date.now(); t.secondsAtStart = parsed; }
    }
    edit.style.display = 'none';
  }
  document.querySelectorAll(`.tdisp-${id}`).forEach(el => { el.style.display = 'block'; el.textContent = fmt(t.seconds); });
  saveToLocal();
}
function resetTimer(id) {
  const t = timers[id];
  t.running = false; t.seconds = TIMER_DEFAULTS[id].seconds; t.startedAt = null; t.secondsAtStart = null;
  document.querySelectorAll(`.tedit-${id}-d, .tedit-${id}-m`).forEach(el => el.style.display = 'none');
  document.querySelectorAll(`.tdisp-${id}`).forEach(el => { el.style.display = 'block'; el.textContent = fmt(t.seconds); });
  updateTimerUI(id);
  saveToLocal();
}

/* ─────────── WAKEUP ─────────── */
function toggleWakeup() {
  wokenUp = !wokenUp;
  ['d','m'].forEach(p => {
    const row = document.getElementById(`wakeupRow-${p}`);
    const box = document.getElementById(`wakeupBox-${p}`);
    if (row) row.classList.toggle('done', wokenUp);
    if (box) box.classList.toggle('checked', wokenUp);
  });
  saveToLocal();
}

/* ─────────── TODO LISTS ─────────── */
function addTodoList() {
  const id = todoIdCounter++;
  todoLists.push({ id, title: '', color: '#5DCAA5', tasks: [], isDefault: false });
  renderTodos();
  saveToLocal();
  setTimeout(() => { const inp = document.getElementById(`todo-title-${id}-d`) || document.getElementById(`todo-title-${id}-m`); if (inp) inp.focus(); }, 10);
}
function removeTodoList(id) {
  todoLists = todoLists.filter(l => l.id !== id); renderTodos(); saveToLocal();
}
function changeTodoColor(id, color) {
  const list = todoLists.find(l => l.id === id); if (!list) return;
  list.color = color;
  document.querySelectorAll(`.todo-swatch-${id}`).forEach(s => s.style.background = color);
  document.querySelectorAll(`.todo-strip-${id}`).forEach(s => s.style.background = color);
  document.querySelectorAll(`.task-checks-${id}.done`).forEach(c => { c.style.background = color; c.style.borderColor = color; });
}
function addTask(listId) {
  const list = todoLists.find(l => l.id === listId); if (!list) return;
  const tid = taskIdCounter++;
  list.tasks.push({ id: tid, text: '', done: false });
  renderTodos();
  saveToLocal();
  setTimeout(() => { const inp = document.querySelector(`input.task-text-${tid}`); if (inp) inp.focus(); }, 10);
}
function removeTask(listId, taskId) {
  const list = todoLists.find(l => l.id === listId); if (!list) return;
  list.tasks = list.tasks.filter(t => t.id !== taskId); renderTodos(); saveToLocal();
}
function toggleTask(listId, taskId) {
  const list = todoLists.find(l => l.id === listId); if (!list) return;
  const task = list.tasks.find(t => t.id === taskId); if (!task) return;
  task.done = !task.done;
  document.querySelectorAll(`.task-checks-${taskId}`).forEach(el => {
    el.classList.toggle('done', task.done);
    el.style.background = task.done ? list.color : '';
    el.style.borderColor = task.done ? list.color : '';
  });
  document.querySelectorAll(`.task-text-${taskId}`).forEach(el => el.classList.toggle('done', task.done));
  saveToLocal();
}

function buildCard(list, pfx) {
  const card = document.createElement('div');
  card.className = 'todo-card';
  card.innerHTML = `
    <div class="todo-accent-strip todo-strip-${list.id}" style="background:${list.color}"></div>
    <div class="todo-card-header">
      <div class="color-swatch todo-swatch-${list.id}" style="background:${list.color}">
        <input type="color" value="${list.color}"
          oninput="changeTodoColor(${list.id},this.value); saveToLocal();">
      </div>
      <input class="todo-title-input" id="todo-title-${list.id}-${pfx}" value="${list.title}" placeholder="List title"
        oninput="todoLists.find(l=>l.id===${list.id}).title=this.value; saveToLocal();">
      <button class="todo-delete-btn" onclick="removeTodoList(${list.id})">×</button>
    </div>
    <div class="todo-tasks">
      ${list.tasks.map(task => `
        <div class="task-row">
          <div class="task-check task-checks-${task.id} ${task.done?'done':''}"
            style="${task.done?`background:${list.color};border-color:${list.color}`:''}"
            onclick="toggleTask(${list.id},${task.id})">
            <svg width="9" height="9" viewBox="0 0 9 9" fill="none">
              <path d="M1.5 4.5L3.5 6.5L7.5 2.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <input class="task-text task-text-${task.id} ${task.done?'done':''}"
            value="${task.text}" placeholder="Task…"
            oninput="todoLists.find(l=>l.id===${list.id}).tasks.find(t=>t.id===${task.id}).text=this.value; saveToLocal();"
            onkeydown="if(event.key==='Enter'){event.preventDefault();addTask(${list.id});}">
          <button class="task-del" onclick="removeTask(${list.id},${task.id})">×</button>
        </div>
      `).join('')}
    </div>
    <div class="todo-add-task">
      <button class="add-task-btn" onclick="addTask(${list.id})">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
          <path d="M5.5 1V10M1 5.5H10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Add task
      </button>
    </div>
  `;
  return card;
}

function renderTodos() {
  [['d'],['m']].forEach(([pfx]) => {
    const defEl  = document.getElementById(`defaultContainer-${pfx}`);
    const custEl = document.getElementById(`todoContainer-${pfx}`);
    const emptyEl= document.getElementById(`emptyState-${pfx}`);
    if (!defEl || !custEl) return;
    defEl.querySelectorAll('.todo-card').forEach(c => c.remove());
    custEl.querySelectorAll('.todo-card').forEach(c => c.remove());
    const customLists = todoLists.filter(l => !l.isDefault);
    if (emptyEl) emptyEl.style.display = customLists.length === 0 ? 'block' : 'none';
    todoLists.filter(l => l.isDefault).forEach(l => defEl.appendChild(buildCard(l, pfx)));
    customLists.forEach(l => custEl.appendChild(buildCard(l, pfx)));
  });
}

/* ─────────── SAVE / LOAD ─────────── */
function gatherState() {
  return {
    version: 1,
    savedAt: Date.now(),
    wokenUp,
    timers: timers.map(t => ({
      id: t.id, label: t.label, color: t.color,
      seconds: Math.round(getRemaining(t)),
      running: t.running,
      startedAt: t.running ? t.startedAt : null,
      secondsAtStart: t.running ? t.secondsAtStart : null,
    })),
    todoIdCounter,
    taskIdCounter,
    todoLists: todoLists.map(l => ({
      id: l.id, title: l.title, color: l.color, isDefault: !!l.isDefault,
      tasks: l.tasks.map(t => ({ id: t.id, text: t.text, done: t.done }))
    }))
  };
}

function applyState(state) {
  if (!state || state.version !== 1) { showToast('Invalid or unsupported file.'); return; }
  wokenUp = !!state.wokenUp;
  ['d','m'].forEach(p => {
    const row = document.getElementById(`wakeupRow-${p}`);
    const box = document.getElementById(`wakeupBox-${p}`);
    if (row) row.classList.toggle('done', wokenUp);
    if (box) box.classList.toggle('checked', wokenUp);
  });
  timers = state.timers.map(t => ({
    id: t.id, label: t.label, color: t.color,
    seconds: t.seconds, running: t.running,
    startedAt: t.startedAt, secondsAtStart: t.secondsAtStart,
  }));
  todoIdCounter = state.todoIdCounter ?? todoIdCounter;
  taskIdCounter = state.taskIdCounter ?? taskIdCounter;
  todoLists = state.todoLists.map(l => ({
    id: l.id, title: l.title, color: l.color, isDefault: !!l.isDefault,
    tasks: l.tasks.map(t => ({ id: t.id, text: t.text, done: t.done }))
  }));
  renderTimers();
  renderTodos();
  showToast('State restored ✓');
}

function copyState() {
  const json = JSON.stringify(gatherState(), null, 2);
  navigator.clipboard.writeText(json)
    .then(() => showToast('Copied to clipboard ✓'))
    .catch(() => showToast('Copy failed — use Download instead'));
}
function downloadState() {
  const json = JSON.stringify(gatherState(), null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `focus-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
  showToast('Downloaded ✓');
}
function triggerUpload() { document.getElementById('fileInput').click(); }
function loadStateFile(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => { try { applyState(JSON.parse(e.target.result)); } catch { showToast('Could not parse file.'); } };
  reader.readAsText(file);
  input.value = '';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

/* ─────────── RESET ALL ─────────── */
function confirmResetAll() {
  document.getElementById('confirmOverlay').classList.add('show');
}
function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('show');
}
function resetAll() {
  closeConfirm();
  // Reset timers
  timers.forEach((t, i) => {
    t.running = false;
    t.seconds = TIMER_DEFAULTS[i].seconds;
    t.startedAt = null; t.secondsAtStart = null;
  });
  // Uncheck wakeup
  wokenUp = false;
  ['d','m'].forEach(p => {
    const row = document.getElementById(`wakeupRow-${p}`);
    const box = document.getElementById(`wakeupBox-${p}`);
    if (row) row.classList.remove('done');
    if (box) box.classList.remove('checked');
  });
  // Uncheck all daily tasks
  todoLists.filter(l => l.isDefault).forEach(l => {
    l.tasks.forEach(t => t.done = false);
  });
  // Custom lists are left untouched
  renderTimers();
  renderTodos();
  saveToLocal();
  showToast('Reset ✓');
}

/* ─────────── LOCAL STORAGE AUTO-SAVE ─────────── */
const LS_KEY = 'focus-app-state';

function saveToLocal() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(gatherState())); } catch(e) {}
}

function loadFromLocal() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return false;
    const state = JSON.parse(raw);
    if (!state || state.version !== 1) return false;
    wokenUp = !!state.wokenUp;
    timers = state.timers.map(t => ({
      id: t.id, label: t.label, color: t.color,
      seconds: t.seconds, running: t.running,
      startedAt: t.startedAt, secondsAtStart: t.secondsAtStart,
    }));
    todoIdCounter = state.todoIdCounter ?? todoIdCounter;
    taskIdCounter = state.taskIdCounter ?? taskIdCounter;
    todoLists = state.todoLists.map(l => ({
      id: l.id, title: l.title, color: l.color, isDefault: !!l.isDefault,
      tasks: l.tasks.map(t => ({ id: t.id, text: t.text, done: t.done }))
    }));
    return true;
  } catch(e) { return false; }
}

// Auto-save every 5 seconds and immediately on tab hide / page close
setInterval(saveToLocal, 2000);
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') saveToLocal();
});
window.addEventListener('pagehide', saveToLocal);

/* ─────────── INIT ─────────── */
const restored = loadFromLocal();
renderTimers();
renderTodos();
if (restored) {
  ['d','m'].forEach(p => {
    const row = document.getElementById(`wakeupRow-${p}`);
    const box = document.getElementById(`wakeupBox-${p}`);
    if (row) row.classList.toggle('done', wokenUp);
    if (box) box.classList.toggle('checked', wokenUp);
  });
}
setSwipePanelWidths();
tickAll();
</script>
